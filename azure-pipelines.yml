trigger:
- main

pr:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildAndTest
    displayName: Build and test
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: Use .NET SDK 10.x
      inputs:
        packageType: sdk
        version: 10.x

    - task: NodeTool@0
      displayName: Use Node.js 22.x
      inputs:
        versionSpec: 22.x

    - script: dotnet restore DiceRoller.slnx
      displayName: Restore solution

    - script: dotnet test Dice.Api.Tests/Dice.Api.Tests.fsproj --configuration Release --logger "console;verbosity=normal"
      displayName: Run API tests

    - task: PowerShell@2
      displayName: Build client and run client unit tests
      inputs:
        targetType: filePath
        filePath: scripts/build-client.ps1
        arguments: -RunUnitTests

    - script: dotnet publish Dice.Api/Dice.Api.fsproj --configuration Release --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API

    - task: PublishPipelineArtifact@1
      displayName: Publish deploy artifact
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/api
        artifact: dice-api


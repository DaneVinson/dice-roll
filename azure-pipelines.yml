trigger:
- main

pr:
- main

variables:
  buildConfiguration: Debug
  azureServiceConnection: DiceRoller
  webAppName: your-web-app-name
  webAppKind: webApp
  deployEnvironment: dice-roll-dev
  resourceGroupName: DiceRoller
  resourceGroupLocation: westus

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildAndTest
    displayName: Build and test
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: Use .NET SDK 10.x
      inputs:
        packageType: sdk
        version: 10.x

    - task: NodeTool@0
      displayName: Use Node.js 22.x
      inputs:
        versionSpec: 22.x

    - script: dotnet restore DiceRoller.slnx
      displayName: Restore solution

    - script: dotnet test Dice.Api.Tests/Dice.Api.Tests.fsproj --configuration $(buildConfiguration) --logger "console;verbosity=normal"
      displayName: Run API tests

    - task: PowerShell@2
      displayName: Build client and run client unit tests
      inputs:
        targetType: filePath
        filePath: scripts/build-client.ps1
        arguments: -RunUnitTests

    - script: dotnet publish Dice.Api/Dice.Api.fsproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API

    - task: ArchiveFiles@2
      displayName: Archive deploy package
      inputs:
        rootFolderOrFile: $(Build.ArtifactStagingDirectory)/api
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/dice-api.zip
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: Publish deploy artifact
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/dice-api.zip
        artifact: dice-api

- stage: Deploy
  displayName: Deploy
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToAzureWebApp
    displayName: Deploy to Azure Web App
    environment: $(deployEnvironment)
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - download: current
            artifact: dice-api

          - task: AzureCLI@2
            displayName: Diagnose subscription and App Service usage
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "=== Active account context ==="
                az account show --output table

                echo ""
                echo "=== Subscription offer type ==="
                az account show --query "{'Subscription':name,'OfferID':id}" --output table

                echo ""
                echo "=== All available Free tier locations ==="
                az appservice list-locations \
                  --sku FREE \
                  --output json

                echo ""
                echo "=== Target region availability ==="
                echo "Checking $(resourceGroupLocation)..."
                az appservice list-locations \
                  --sku FREE \
                  --query "[?name=='$(resourceGroupLocation)']" \
                  --output json || echo "Not found in Free tier"

          - task: AzureCLI@2
            displayName: Create resource group
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az group create \
                  --name $(resourceGroupName) \
                  --location $(resourceGroupLocation)

          - task: AzureCLI@2
            displayName: Deploy Bicep template
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group $(resourceGroupName) \
                  --template-file infrastructure/main.bicep \
                  --parameters infrastructure/dev.bicepparam

          - task: AzureWebApp@1
            displayName: Deploy package to Azure Web App
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: $(webAppKind)
              appName: $(webAppName)
              package: $(Pipeline.Workspace)/dice-api/dice-api.zip
